services:
  - type: web
    name: medichain-backend
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        sync: false
      - key: MONGODB_URI
        sync: false
      - key: CLOUDINARY_NAME
        sync: false
      - key: CLOUDINARY_API_KEY
        sync: false
      - key: CLOUDINARY_SECRET_KEY
        sync: false
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_BUSINESS_ACCOUNT_ID
        sync: false
      - key: WHATSAPP_VERIFY_TOKEN
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: BERVO_API_KEY
        sync: false
      - key: BERVO_SENDER_EMAIL
        sync: false
      - key: FRONTEND_URL
        value: https://medichain-nine-theta.vercel.app
      - key: ADMIN_URL
        value: https://admin-ivory-eight-28.vercel.app
      - key: CURRENCY
        value: INR
      - key: PLATFORM_FEE_PERCENTAGE
        value: "5"
      - key: GST_PERCENTAGE
        value: "18"
